# Dependabot — atualizações automáticas de dependências.
# Cria PRs (não merge). Revisão humana obrigatória.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Dependências Node via package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      patch-updates:
        update-types:
          - "patch"
    # Bloqueios explícitos:
    # - "next" 14 → 16 é EXC-001 (plano próprio, issue #56). Major bloqueado.
    # - "date-fns" não é importado em src/ (dep morta). Removida do
    #   package.json em PR-7 e ignorada aqui para não voltar via Dependabot.
    # - "recharts" major (3.x) requer migração visual dedicada — bloqueado
    #   até a migração ser planejada em sprint específica.
    # - "eslint" major (9+/10): incompatível com
    #   eslint-config-next@14.x (peer "^7.23.0 || ^8.0.0"). PR #79
    #   confirmou eresolve failure. Destrava quando Next 14→16 (EXC-001).
    # - "tailwindcss" major (4.x): mudança brutal de config (novo
    #   PostCSS, remove autoprefixer, migration manual). PR #80
    #   confirmou CI fail. Aguardar migração dedicada após Next 16.
    # - "typescript" major (6.x): peer conflict com eslint-config-next e
    #   provável surfacing de type errors. PR #82 confirmou CI fail.
    #   Destrava com Next 16.
    # - "react" / "react-dom" major (19.x): Next 14.x exige peer
    #   `react@^18.2.0` / `react-dom@^18.2.0`. PR #88 confirmou eresolve.
    #   Destrava com Next 16.
    # - "@types/react" / "@types/react-dom" major (19.x): seguem a react
    #   correspondente (não faz sentido subir types antes da runtime).
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "date-fns"
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
