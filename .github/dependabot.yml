# Dependabot — atualizações automáticas de dependências.
# Cria PRs (não merge). Revisão humana obrigatória.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Dependências Node via package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      patch-updates:
        update-types:
          - "patch"
    # Bloqueios explícitos (atualizados no PR-4 — baseline agora Next 16 +
    # React 19 + ESLint 9). EXC-001 (Next 14→16, issue #56) RESOLVIDO pelo PR-4.
    # Política mantida: bumps MAJOR são upgrades COORDENADOS (um PR único que
    # sobe runtime + peers + config juntos), nunca PR solo do Dependabot — os
    # PRs #164/#171 (eslint-config-next 16 sozinho) e #79/#80/#82/#88 provaram
    # que o bump isolado quebra o CI (ERESOLVE / type errors). Por isso os
    # majors abaixo seguem ignorados, agora como "fazer via PR coordenado":
    # - "next" major (17+): próximo salto de framework — coordenado.
    # - "react" / "react-dom" major (20+, futuro): seguem o suporte do Next.
    # - "@types/react" / "@types/react-dom" major: seguem a runtime react.
    # - "eslint" major (10+): eslint-config-next@16 traz
    #   eslint-plugin-react-hooks@7, cujo peer inicial limita a ^9 — major
    #   coordenado quando o plugin acompanhar.
    # - "typescript" major (6.x): provável surfacing de type errors — coordenado.
    # - "recharts" major (3.x): rewrite interno (Redux) — migração visual dedicada.
    # - "tailwindcss" major (4.x): novo PostCSS, remove autoprefixer — migração dedicada.
    # - "date-fns": não é importado em src/ (dep morta) — ignorada p/ não voltar.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "date-fns"
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
