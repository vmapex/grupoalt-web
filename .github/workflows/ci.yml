name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --passWithNoTests
        if: hashFiles('src/**/*.test.*') != ''
