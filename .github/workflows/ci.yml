name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit bundle secrets
        run: npm run audit:bundle

      # npm audit (producao, high+) e bloqueante por politica.
      # Excecoes vivas em docs/plano-acao-seguranca/audit-exceptions.md
      # com dono, motivo e data de revisao. Atualmente relaxado por
      # excecao registrada de Next 14.x (review por Step 16+).
      - name: Audit npm dependencies (production, high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
