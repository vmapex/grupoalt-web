<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Favicon do Portal Grupo ALT — "A" dourado sobre navy (design system).
       Servido pelo App Router como /icon.svg em todas as rotas; antes o
       navegador pedia /favicon.ico e levava 404. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E4C8F"/>
      <stop offset="1" stop-color="#043A76"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <text x="32" y="45" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#E0B82E" style="text-shadow: 0 0 8px rgba(224,184,46,0.45)">A</text>
</svg>
